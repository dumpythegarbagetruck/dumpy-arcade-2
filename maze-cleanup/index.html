<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dumpy Maze Cleanup</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">
    <h1>Dumpy Maze Cleanup</h1>
    <p class="subtitle">Drive through the park maze and collect all the trash.</p>

    <div class="info-bar">
      <div class="info-box">
        <span class="info-label">Score</span>
        <span id="score">0</span>
          <span class="info-label">Time</span>
  <span id="timer">15</span>
      </div>

      <div class="info-box">
        <span class="info-label">Trash Left</span>
        <span id="trash-left">0</span>
      </div>
    </div>

    <div id="game-area">
      <div id="maze"></div>
    </div>

    <div class="controls-note">
      Use the arrow keys to move Dumpy through the maze.
    </div>

    <button id="start-btn">Start Game</button>
    <p id="message"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
