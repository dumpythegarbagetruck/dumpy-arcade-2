<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dumpy Spell and Drive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">
    <h1>Dumpy Spell and Drive</h1>
    <p class="subtitle">Drive into the lane with the correct next letter.</p>

    <div class="info-bar">
      <div class="info-box">
        <span class="info-label">Score</span>
        <span id="score">0</span>
      </div>

      <div class="info-box">
        <span class="info-label">Round</span>
        <span id="round">0</span>
      </div>
    </div>

    <div class="word-panel">
      <div class="word-label">Spell This Word</div>
      <div id="target-word">Press Start</div>
      <div id="word-progress">_ _ _</div>
    </div>

    <div id="game-area">
      <div id="letters-row">
        <div class="letter-lane" data-lane="0">
          <div class="letter-box" id="letter-0">A</div>
        </div>

        <div class="letter-lane" data-lane="1">
          <div class="letter-box" id="letter-1">B</div>
        </div>

        <div class="letter-lane" data-lane="2">
          <div class="letter-box" id="letter-2">C</div>
        </div>
      </div>

      <img id="dumpy" src="images/dumpy.png" alt="Dumpy the Garbage Truck" />
    </div>

    <div class="controls-note">
      Use the left and right arrow keys to move. Press up, space, or enter to choose.
    </div>

    <button id="start-btn">Start Game</button>
    <p id="message"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
