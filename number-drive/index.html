<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dumpy Number Drive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">
    <h1>Dumpy Number Drive</h1>
    <p class="subtitle">Drive into the lane with the correct answer.</p>

    <div class="info-bar">
      <div class="info-box">
        <span class="info-label">Score</span>
        <span id="score">0</span>
      </div>

      <div class="info-box">
        <span class="info-label">Round</span>
        <span id="round">0</span>
      </div>
    </div>

    <div class="question-box">
      <span id="question-text">Press Start to Play</span>
    </div>

    <div id="game-area">
      <div id="answers-row">
        <div class="answer-lane" data-lane="0">
          <div class="answer-box" id="answer-0">0</div>
        </div>

        <div class="answer-lane" data-lane="1">
          <div class="answer-box" id="answer-1">0</div>
        </div>

        <div class="answer-lane" data-lane="2">
          <div class="answer-box" id="answer-2">0</div>
        </div>
      </div>

      <img id="dumpy" src="/number-drive/images/dumpy.png" alt="Dumpy the Garbage Truck" />
    </div>

    <div class="controls-note">
      Use the left and right arrow keys to move Dumpy.
    </div>

    <button id="start-btn">Start Game</button>
    <p id="message"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
