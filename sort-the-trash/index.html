<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dumpy Sort the Trash</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-wrapper">
      <h1>Dumpy Sort the Trash</h1>
      <p class="subtitle">Help Dumpy put each item in the right bin.</p>

      <div class="info-bar">
        <div class="info-box">
          <span class="info-label">Score</span>
          <span id="score">0</span>
        </div>

        <div class="info-box">
          <span class="info-label">Round</span>
          <span id="round">0</span>
        </div>
      </div>

      <div id="game-area">
        <img id="dumpy" src="images/dumpy.png" alt="Dumpy the Garbage Truck" />

        <div class="item-area">
          <p class="prompt-text">Which bin does this go in?</p>
          <img id="current-item" src="" alt="Trash item" />
        </div>

        <div class="bins">
          <button class="bin-btn trash-bin" data-bin="trash">Trash</button>
          <button class="bin-btn recycle-bin" data-bin="recycling">
            Recycling
          </button>
        </div>
      </div>

      <button id="start-btn">Start Game</button>
      <p id="message"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
